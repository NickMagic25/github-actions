name: Build and Publish Hard Boiled Yolks Python

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 6'
  push:
    paths:
      - .github/workflows/build-hard-boiled-yolks-python.yml

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare Python Melange Artifact
    runs-on: edrisil-arc
    env:
      SOURCE_REPOSITORY: NickMagic25/hard-boiled-yolks
      SOURCE_PATH: hard-boiled-yolks
    outputs:
      versions: ${{ steps.discover.outputs.versions }}
    steps:
      - name: Checkout hard-boiled-yolks
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPOSITORY }}
          path: ${{ env.SOURCE_PATH }}

      - name: Discover Python versions
        id: discover
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t versions < <(
            find "${SOURCE_PATH}/python" -mindepth 2 -maxdepth 2 -type f -name apko.yaml \
              | sed -E 's#.*/python/([^/]+)/apko.yaml#\1#' \
              | sort -V
          )

          if [ "${#versions[@]}" -eq 0 ]; then
            echo "No Python apko.yaml files found."
            exit 1
          fi

          json="["
          for i in "${!versions[@]}"; do
            if [ "$i" -gt 0 ]; then
              json+=","
            fi
            json+="\"${versions[$i]}\""
          done
          json+="]"

          echo "versions=${json}" >> "${GITHUB_OUTPUT}"
          echo "Discovered Python versions: ${versions[*]}"

      - name: Generate melange signing key
        shell: bash
        run: |
          set -euo pipefail
          melange keygen "${GITHUB_WORKSPACE}/${SOURCE_PATH}/python/melange.rsa"

      - name: Build Python melange packages
        shell: bash
        run: |
          set -euo pipefail
          melange build \
            "${GITHUB_WORKSPACE}/${SOURCE_PATH}/python/entrypoint/melange.yaml" \
            --arch x86_64 \
            --signing-key "${GITHUB_WORKSPACE}/${SOURCE_PATH}/python/melange.rsa" \
            --out-dir "${GITHUB_WORKSPACE}/${SOURCE_PATH}/python/packages" \
            --source-dir "${GITHUB_WORKSPACE}/${SOURCE_PATH}/python"

      - name: Upload Python melange artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-melange-packages
          path: |
            ${{ env.SOURCE_PATH }}/python/packages
            ${{ env.SOURCE_PATH }}/python/melange.rsa.pub
          if-no-files-found: error

  publish:
    name: Publish Python ${{ matrix.version }}
    needs: prepare
    environment: harbor
    runs-on: edrisil-arc
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJson(needs.prepare.outputs.versions) }}
    env:
      SOURCE_REPOSITORY: NickMagic25/hard-boiled-yolks
      SOURCE_PATH: hard-boiled-yolks
      HARBOR_REGISTRY: harbor.edrisil.net
      HARBOR_PROJECT: ${{ vars.HARBOR_REPOSITORY || 'hard-boiled-yolks' }}
    steps:
      - name: Checkout hard-boiled-yolks
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPOSITORY }}
          path: ${{ env.SOURCE_PATH }}

      - name: Download Python melange artifact
        uses: actions/download-artifact@v4
        with:
          name: python-melange-packages
          path: ${{ env.SOURCE_PATH }}/python

      - name: Configure Harbor auth
        shell: bash
        env:
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.docker"
          auth="$(printf '%s:%s' "${HARBOR_USERNAME}" "${HARBOR_PASSWORD}" | base64 | tr -d '\n')"
          printf '{"auths":{"%s":{"auth":"%s"}}}' "${HARBOR_REGISTRY}" "${auth}" > "${HOME}/.docker/config.json"

      - name: Publish Python ${{ matrix.version }} image
        shell: bash
        run: |
          set -euo pipefail

          image_ref="${HARBOR_REGISTRY}/${HARBOR_PROJECT}/python_${{ matrix.version }}"

          pushd "${GITHUB_WORKSPACE}/${SOURCE_PATH}/python" >/dev/null
          apko publish "${{ matrix.version }}/apko.yaml" "${image_ref}" \
            --arch x86_64 \
            --keyring-append melange.rsa.pub \
            --repository-append ./packages
          popd >/dev/null
