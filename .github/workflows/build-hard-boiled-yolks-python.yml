name: Build and Publish Hard Boiled Yolks Python

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/build-hard-boiled-yolks-python.yml

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare Python Melange Artifact
    runs-on:
      - self-hosted
      - edrisil-arc
    env:
      SOURCE_REPOSITORY: NickMagic25/hard-boiled-yolks
      SOURCE_PATH: hard-boiled-yolks
    outputs:
      versions: ${{ steps.discover.outputs.versions }}
    steps:
      - name: Checkout hard-boiled-yolks
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPOSITORY }}
          path: ${{ env.SOURCE_PATH }}

      - name: Discover Python versions
        id: discover
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t versions < <(
            find "${SOURCE_PATH}/python" -mindepth 2 -maxdepth 2 -type f -name apko.yaml \
              | sed -E 's#.*/python/([^/]+)/apko.yaml#\1#' \
              | sort -V
          )

          if [ "${#versions[@]}" -eq 0 ]; then
            echo "No Python apko.yaml files found."
            exit 1
          fi

          json="["
          for i in "${!versions[@]}"; do
            if [ "$i" -gt 0 ]; then
              json+=","
            fi
            json+="\"${versions[$i]}\""
          done
          json+="]"

          echo "versions=${json}" >> "${GITHUB_OUTPUT}"
          echo "Discovered Python versions: ${versions[*]}"

      - name: Set up melange
        uses: chainguard-dev/actions/setup-melange@0cf1221da92242205c2d9f8a63add344ebd6b304

      - name: Generate melange signing key
        uses: chainguard-dev/actions/melange-keygen@0cf1221da92242205c2d9f8a63add344ebd6b304
        with:
          signing-key-path: ${{ github.workspace }}/${{ env.SOURCE_PATH }}/python/melange.rsa
          install-public-key: false

      - name: Build Python melange packages
        uses: chainguard-dev/actions/melange-build-pkg@0cf1221da92242205c2d9f8a63add344ebd6b304
        with:
          config: entrypoint/melange.yaml
          archs: x86_64,aarch64
          sign-with-key: true
          signing-key-path: ${{ github.workspace }}/${{ env.SOURCE_PATH }}/python/melange.rsa
          repository-path: ${{ github.workspace }}/${{ env.SOURCE_PATH }}/python/packages
          source-dir: ${{ github.workspace }}
          workdir: ${{ env.SOURCE_PATH }}/python

      - name: Upload Python melange artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-melange-packages
          path: |
            ${{ env.SOURCE_PATH }}/python/packages
            ${{ env.SOURCE_PATH }}/python/melange.rsa.pub
          if-no-files-found: error

  publish:
    name: Publish Python ${{ matrix.version }}
    needs: prepare
    environment: harbor
    runs-on:
      - self-hosted
      - edrisil-arc
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJson(needs.prepare.outputs.versions) }}
    env:
      SOURCE_REPOSITORY: NickMagic25/hard-boiled-yolks
      SOURCE_PATH: hard-boiled-yolks
      HARBOR_REGISTRY: harbor.edrisil.net
      HARBOR_PROJECT: ${{ vars.HARBOR_PROJECT || 'library' }}
      HARBOR_REPOSITORY: ${{ vars.HARBOR_REPOSITORY || 'hard-boiled-yolks' }}
    steps:
      - name: Checkout hard-boiled-yolks
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPOSITORY }}
          path: ${{ env.SOURCE_PATH }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Install apko CLI
        shell: bash
        run: |
          set -euo pipefail
          go install chainguard.dev/apko@latest
          echo "$(go env GOPATH)/bin" >> "${GITHUB_PATH}"

      - name: Download Python melange artifact
        uses: actions/download-artifact@v4
        with:
          name: python-melange-packages
          path: ${{ env.SOURCE_PATH }}/python

      - name: Configure Harbor auth for apko
        shell: bash
        env:
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.docker"
          auth="$(printf '%s:%s' "${HARBOR_USERNAME}" "${HARBOR_PASSWORD}" | base64 | tr -d '\n')"
          cat > "${HOME}/.docker/config.json" <<EOF
          {
            "auths": {
              "${HARBOR_REGISTRY}": {
                "auth": "${auth}"
              }
            }
          }
          EOF

      - name: Publish Python image
        shell: bash
        run: |
          set -euo pipefail

          image_ref="${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${HARBOR_REPOSITORY}:python_${{ matrix.version }}"

          pushd "${SOURCE_PATH}/python" >/dev/null
          apko publish "${{ matrix.version }}/apko.yaml" "${image_ref}" \
            --keyring-append melange.rsa.pub \
            --repository-append ./packages
          popd >/dev/null
