name: Build and Publish Hard Boiled Yolks Python

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/build-hard-boiled-yolks-python.yml

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare Python Melange Artifact
    runs-on:
      - self-hosted
      - edrisil-arc
    env:
      SOURCE_REPOSITORY: NickMagic25/hard-boiled-yolks
      SOURCE_PATH: hard-boiled-yolks
      MELANGE_IMAGE: cgr.dev/chainguard/melange:latest
    outputs:
      versions: ${{ steps.discover.outputs.versions }}
    steps:
      - name: Checkout hard-boiled-yolks
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPOSITORY }}
          path: ${{ env.SOURCE_PATH }}

      - name: Discover Python versions
        id: discover
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t versions < <(
            find "${SOURCE_PATH}/python" -mindepth 2 -maxdepth 2 -type f -name apko.yaml \
              | sed -E 's#.*/python/([^/]+)/apko.yaml#\1#' \
              | sort -V
          )

          if [ "${#versions[@]}" -eq 0 ]; then
            echo "No Python apko.yaml files found."
            exit 1
          fi

          json="["
          for i in "${!versions[@]}"; do
            if [ "$i" -gt 0 ]; then
              json+=","
            fi
            json+="\"${versions[$i]}\""
          done
          json+="]"

          echo "versions=${json}" >> "${GITHUB_OUTPUT}"
          echo "Discovered Python versions: ${versions[*]}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build Python melange packages
        shell: bash
        run: |
          set -euo pipefail

          pushd "${SOURCE_PATH}/python" >/dev/null
          rm -f melange.rsa melange.rsa.pub
          rm -rf packages

          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${PWD}:/work" \
            -w /work \
            "${MELANGE_IMAGE}" keygen

          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${PWD}:/work" \
            -w /work \
            "${MELANGE_IMAGE}" build entrypoint/melange.yaml \
              --source-dir . \
              --signing-key melange.rsa \
              --runner docker
          popd >/dev/null

      - name: Upload Python melange artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-melange-packages
          path: |
            ${{ env.SOURCE_PATH }}/python/packages
            ${{ env.SOURCE_PATH }}/python/melange.rsa.pub
          if-no-files-found: error

  publish:
    name: Publish Python ${{ matrix.version }}
    needs: prepare
    environment: harbor
    runs-on:
      - self-hosted
      - edrisil-arc
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJson(needs.prepare.outputs.versions) }}
    env:
      SOURCE_REPOSITORY: NickMagic25/hard-boiled-yolks
      SOURCE_PATH: hard-boiled-yolks
      APKO_IMAGE: cgr.dev/chainguard/apko:latest
      HARBOR_REGISTRY: harbor.edrisil.net
      HARBOR_PROJECT: ${{ vars.HARBOR_PROJECT || 'library' }}
      HARBOR_REPOSITORY: ${{ vars.HARBOR_REPOSITORY || 'hard-boiled-yolks' }}
    steps:
      - name: Checkout hard-boiled-yolks
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPOSITORY }}
          path: ${{ env.SOURCE_PATH }}

      - name: Download Python melange artifact
        uses: actions/download-artifact@v4
        with:
          name: python-melange-packages
          path: ${{ env.SOURCE_PATH }}/python

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Publish Python image
        shell: bash
        run: |
          set -euo pipefail

          image_ref="${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${HARBOR_REPOSITORY}:python_${{ matrix.version }}"
          docker_config="${HOME}/.docker"

          if [ ! -f "${docker_config}/config.json" ]; then
            echo "Docker auth config not found at ${docker_config}/config.json"
            exit 1
          fi

          pushd "${SOURCE_PATH}/python" >/dev/null
          docker run --rm \
            -v "${docker_config}:/root/.docker:ro" \
            -v "${PWD}:/work" \
            -w /work \
            "${APKO_IMAGE}" publish "${{ matrix.version }}/apko.yaml" "${image_ref}" \
              --keyring-append melange.rsa.pub \
              --repository-append ./packages
          popd >/dev/null
