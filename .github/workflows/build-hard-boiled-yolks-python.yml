name: Build and Publish Hard Boiled Yolks Python

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 6'
  push:
    paths:
      - .github/workflows/build-hard-boiled-yolks-python.yml

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare Python Melange Artifact
    runs-on: edrisil-arc
    env:
      SOURCE_REPOSITORY: NickMagic25/hard-boiled-yolks
      SOURCE_PATH: hard-boiled-yolks
    outputs:
      versions: ${{ steps.discover.outputs.versions }}
    steps:
      - name: Checkout actions
        uses: actions/checkout@v4

      - name: Checkout hard-boiled-yolks
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPOSITORY }}
          path: ${{ env.SOURCE_PATH }}

      - name: Discover Python versions
        id: discover
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t versions < <(
            find "${SOURCE_PATH}/python" -mindepth 2 -maxdepth 2 -type f -name apko.yaml \
              | sed -E 's#.*/python/([^/]+)/apko.yaml#\1#' \
              | sort -V
          )

          if [ "${#versions[@]}" -eq 0 ]; then
            echo "No Python apko.yaml files found."
            exit 1
          fi

          json="["
          for i in "${!versions[@]}"; do
            if [ "$i" -gt 0 ]; then
              json+=","
            fi
            json+="\"${versions[$i]}\""
          done
          json+="]"

          echo "versions=${json}" >> "${GITHUB_OUTPUT}"
          echo "Discovered Python versions: ${versions[*]}"

      - name: Build and upload melange packages
        uses: ./.github/actions/melange-build
        with:
          component: python
          configs: entrypoint/melange.yaml
          source-path: ${{ env.SOURCE_PATH }}

  publish:
    name: Publish Python ${{ matrix.version }}
    needs: prepare
    environment: harbor
    runs-on: edrisil-arc
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJson(needs.prepare.outputs.versions) }}
    env:
      SOURCE_REPOSITORY: NickMagic25/hard-boiled-yolks
      SOURCE_PATH: hard-boiled-yolks
      HARBOR_REGISTRY: harbor.edrisil.net
      HARBOR_PROJECT: ${{ vars.HARBOR_REPOSITORY || 'hard-boiled-yolks' }}
    steps:
      - name: Checkout actions
        uses: actions/checkout@v4

      - name: Checkout hard-boiled-yolks
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPOSITORY }}
          path: ${{ env.SOURCE_PATH }}

      - name: Publish image
        uses: ./.github/actions/apko-publish
        with:
          component: python
          image-name: python_${{ matrix.version }}
          apko-config: ${{ matrix.version }}/apko.yaml
          source-path: ${{ env.SOURCE_PATH }}
          harbor-registry: ${{ env.HARBOR_REGISTRY }}
          harbor-project: ${{ env.HARBOR_PROJECT }}
          harbor-username: ${{ secrets.HARBOR_USERNAME }}
          harbor-password: ${{ secrets.HARBOR_PASSWORD }}
