name: Build and Publish Hard Boiled Yolks Java

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/build-hard-boiled-yolks-java.yml

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare Java Melange Artifact
    runs-on: edrisil-arc
    env:
      SOURCE_REPOSITORY: NickMagic25/hard-boiled-yolks
      SOURCE_PATH: hard-boiled-yolks
    steps:
      - name: Checkout hard-boiled-yolks
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPOSITORY }}
          path: ${{ env.SOURCE_PATH }}

      - name: Generate melange signing key
        shell: bash
        run: |
          set -euo pipefail
          melange keygen "${GITHUB_WORKSPACE}/${SOURCE_PATH}/java/melange.rsa"

      - name: Build Java melange packages
        shell: bash
        run: |
          set -euo pipefail
          melange build \
            "${GITHUB_WORKSPACE}/${SOURCE_PATH}/java/entrypoint/melange.yaml" \
            --arch x86_64 \
            --signing-key "${GITHUB_WORKSPACE}/${SOURCE_PATH}/java/melange.rsa" \
            --out-dir "${GITHUB_WORKSPACE}/${SOURCE_PATH}/java/packages" \
            --source-dir "${GITHUB_WORKSPACE}/${SOURCE_PATH}/java"

      - name: Upload Java melange artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-melange-packages
          path: |
            ${{ env.SOURCE_PATH }}/java/packages
            ${{ env.SOURCE_PATH }}/java/melange.rsa.pub
          if-no-files-found: error

  publish:
    name: Publish Java ${{ matrix.version }}
    needs: prepare
    environment: harbor
    runs-on: edrisil-arc
    strategy:
      fail-fast: false
      matrix:
        version: ["8", "11", "17", "18", "19", "21", "25"]
    env:
      SOURCE_REPOSITORY: NickMagic25/hard-boiled-yolks
      SOURCE_PATH: hard-boiled-yolks
      HARBOR_REGISTRY: harbor.edrisil.net
      HARBOR_PROJECT: ${{ vars.HARBOR_PROJECT || 'library' }}
      HARBOR_REPOSITORY: ${{ vars.HARBOR_REPOSITORY || 'hard-boiled-yolks' }}
    steps:
      - name: Checkout hard-boiled-yolks
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPOSITORY }}
          path: ${{ env.SOURCE_PATH }}

      - name: Download Java melange artifact
        uses: actions/download-artifact@v4
        with:
          name: java-melange-packages
          path: ${{ env.SOURCE_PATH }}/java

      - name: Configure Harbor auth
        shell: bash
        env:
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.docker"
          auth="$(printf '%s:%s' "${HARBOR_USERNAME}" "${HARBOR_PASSWORD}" | base64 | tr -d '\n')"
          cat > "${HOME}/.docker/config.json" <<EOF
          {
            "auths": {
              "${HARBOR_REGISTRY}": {
                "auth": "${auth}"
              }
            }
          }
EOF

      - name: Publish Java ${{ matrix.version }} image
        shell: bash
        run: |
          set -euo pipefail

          image_ref="${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${HARBOR_REPOSITORY}:java_${{ matrix.version }}"

          pushd "${GITHUB_WORKSPACE}/${SOURCE_PATH}/java" >/dev/null
          apko publish "${{ matrix.version }}/apko.yaml" "${image_ref}" \
            --arch x86_64 \
            --keyring-append melange.rsa.pub \
            --repository-append ./packages
          popd >/dev/null
