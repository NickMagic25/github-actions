name: Build and Publish Hard Boiled Yolks SteamCMD

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/build-hard-boiled-yolks-steamcmd.yml

permissions:
  contents: read

jobs:
  publish:
    name: Publish SteamCMD
    environment: harbor
    runs-on:
      - self-hosted
      - edrisil-arc
    env:
      SOURCE_REPOSITORY: NickMagic25/hard-boiled-yolks
      SOURCE_PATH: hard-boiled-yolks
      MELANGE_IMAGE: cgr.dev/chainguard/melange:latest
      APKO_IMAGE: cgr.dev/chainguard/apko:latest
      HARBOR_REGISTRY: harbor.edrisil.net
      HARBOR_PROJECT: ${{ vars.HARBOR_PROJECT || 'library' }}
      HARBOR_REPOSITORY: ${{ vars.HARBOR_REPOSITORY || 'hard-boiled-yolks' }}
    steps:
      - name: Checkout hard-boiled-yolks
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPOSITORY }}
          path: ${{ env.SOURCE_PATH }}

      - name: Build SteamCMD melange packages
        shell: bash
        run: |
          set -euo pipefail

          pushd "${SOURCE_PATH}/steamcmd" >/dev/null
          rm -f melange.rsa melange.rsa.pub
          rm -rf packages

          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${PWD}:/work" \
            -w /work \
            "${MELANGE_IMAGE}" keygen

          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${PWD}:/work" \
            -w /work \
            "${MELANGE_IMAGE}" build runtime/melange.yaml \
              --source-dir . \
              --signing-key melange.rsa \
              --runner docker

          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${PWD}:/work" \
            -w /work \
            "${MELANGE_IMAGE}" build entrypoint/melange.yaml \
              --source-dir . \
              --signing-key melange.rsa \
              --runner docker
          popd >/dev/null

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Publish SteamCMD image
        shell: bash
        run: |
          set -euo pipefail

          image_ref="${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${HARBOR_REPOSITORY}:steamcmd"
          docker_config="${HOME}/.docker"

          if [ ! -f "${docker_config}/config.json" ]; then
            echo "Docker auth config not found at ${docker_config}/config.json"
            exit 1
          fi

          pushd "${SOURCE_PATH}/steamcmd" >/dev/null
          docker run --rm \
            -v "${docker_config}:/root/.docker:ro" \
            -v "${PWD}:/work" \
            -w /work \
            "${APKO_IMAGE}" publish apko.yaml "${image_ref}" \
              --keyring-append melange.rsa.pub \
              --repository-append ./packages
          popd >/dev/null
