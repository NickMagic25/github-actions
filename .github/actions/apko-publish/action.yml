name: Apko Publish
description: Download melange artifact, configure Harbor auth, and publish image with apko

inputs:
  component:
    description: Component name (used for artifact name and paths)
    required: true
  image-name:
    description: Image name suffix for the registry ref
    required: true
  apko-config:
    description: Path to apko.yaml relative to the component directory
    required: true
  source-path:
    description: Checkout path of the source repo
    required: true
  harbor-registry:
    description: Harbor registry hostname
    required: true
  harbor-project:
    description: Harbor project name
    required: true
  harbor-username:
    description: Harbor username
    required: true
  harbor-password:
    description: Harbor password
    required: true
  arch:
    description: Build architecture
    required: false
    default: x86_64

runs:
  using: composite
  steps:
    - name: Download melange artifact
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.component }}-melange-packages
        path: ${{ inputs.source-path }}/${{ inputs.component }}

    - name: Configure Harbor auth
      shell: bash
      env:
        HARBOR_REGISTRY: ${{ inputs.harbor-registry }}
        HARBOR_USERNAME: ${{ inputs.harbor-username }}
        HARBOR_PASSWORD: ${{ inputs.harbor-password }}
      run: |
        set -euo pipefail
        mkdir -p "${HOME}/.docker"
        auth="$(printf '%s:%s' "${HARBOR_USERNAME}" "${HARBOR_PASSWORD}" | base64 | tr -d '\n')"
        printf '{"auths":{"%s":{"auth":"%s"}}}' "${HARBOR_REGISTRY}" "${auth}" > "${HOME}/.docker/config.json"

    - name: Publish image
      shell: bash
      env:
        HARBOR_REGISTRY: ${{ inputs.harbor-registry }}
        HARBOR_PROJECT: ${{ inputs.harbor-project }}
      run: |
        set -euo pipefail

        image_ref="${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${{ inputs.image-name }}"

        pushd "${GITHUB_WORKSPACE}/${{ inputs.source-path }}/${{ inputs.component }}" >/dev/null
        apko publish "${{ inputs.apko-config }}" "${image_ref}" \
          --arch ${{ inputs.arch }} \
          --keyring-append melange.rsa.pub \
          --repository-append ./packages
        popd >/dev/null
